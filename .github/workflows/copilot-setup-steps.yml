name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .mise.toml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .mise.toml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up mise and install tools
        uses: jdx/mise-action@v2
